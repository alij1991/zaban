version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  record: ^6.2.0
  audioplayers: ^6.1.0
  intl: ^0.20.2
  collection: ^1.19.1
  window_manager: ^0.5.1
  file_picker: ^8.0.0
  llama_cpp_dart: ^0.2.2
  flutter_gemma: ^0.13.2
#  llm_toolkit: ^0.0.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

